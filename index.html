const { useState, useEffect, useRef } = React;

/* ── Reveal hook ── */
function useReveal(delay = 0) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVis(true); }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, vis];
}

/* ── Image component with cinematic overlay ── */
function CineImg({ src, alt, style, className, overlay = true }) {
  return (

      {overlay && <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, transparent 40%, rgba(12,7,5,0.55) 100%)', pointerEvents:'none' }} />}

}

          <div style={{ display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'center' }}>
            <a href="#order" id="order"
              style={{ background:'#0C0705', color:'#C8973A', padding:'.7rem 1.8rem', borderRadius:4, fontFamily:'sans-serif', fontSize:'.88rem', fontWeight:800, textDecoration:'none', letterSpacing:'.06em', textTransform:'uppercase', transition:'all .2s' }}
              onMouseEnter={e=>e.target.style.background='#2C1208'}
              onMouseLeave={e=>e.target.style.background='#0C0705'}
            >Order Now</a>
            <a href="#menu"
              style={{ color:'#0C0705', fontFamily:'sans-serif', fontSize:'.88rem', fontWeight:700, textDecoration:'none', letterSpacing:'.04em', textTransform:'uppercase', borderBottom:'2px solid rgba(12,7,5,0.3)', paddingBottom:2 }}
            >View Menu →</a>
          </div>
        </div>

        {/* ── ref anchor for reveal ── */}
        <div ref={heroRef} style={{ position:'absolute', top:'40%', left:0, pointerEvents:'none' }} />
      </section>

      {/* ════════════ MARQUEE (Social Proof) ════════════ */}
      <section ref={proofRef} style={{ background:'#100A04', borderTop:'1px solid rgba(200,151,58,0.1)', borderBottom:'1px solid rgba(200,151,58,0.1)', padding:'1.6rem 0', overflow:'hidden' }}>
        <div style={{ display:'flex', overflow:'hidden' }}>
          <div className="marquee-inner" style={{ whiteSpace:'nowrap' }}>
            {[...PLATFORMS,...PLATFORMS].map((p,i) => (
              <div key={i} style={{ display:'inline-flex', alignItems:'center', gap:'1rem' }}>
                <span style={{ fontFamily:'sans-serif', fontSize:'.8rem', fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:'#3A2A1A' }}>✦</span>
                <span style={{ fontFamily:'sans-serif', fontSize:'.85rem', fontWeight:600, letterSpacing:'.08em', color:'#5A4A3A' }}>{p}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ════════════ FEATURES ════════════ */}
      <section ref={featRef} style={{ padding:'6rem 1.8rem', background:'#0C0705' }}>
        <div style={{ maxWidth:1200, margin:'0 auto' }}>
          <div className={`fade-up${featVis?' in':''}`} style={{ maxWidth:500, marginBottom:'4rem' }}>
            <div className="label">Why Arcadia</div>
            <h2 className="section-title">More Than<br />a Meal</h2>
            <div className="divider" />
            <p style={{ fontFamily:'sans-serif', color:'#5A4A3A', fontSize:'1rem', lineHeight:1.8 }}>
              From first bite to last sip, every detail is looked after so you can focus on the people you're with.
            </p>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))', gap:'1px', border:'1px solid rgba(200,151,58,0.1)', borderRadius:8, overflow:'hidden' }}>
            {FEATURES.map((f, i) => (
              <div key={f.n}
                className={`fade-up${featVis?' in':''}`}
                style={{
                  background:'#100A04', padding:'2.2rem 1.8rem',
                  borderRight:'1px solid rgba(200,151,58,0.08)',
                  borderBottom:'1px solid rgba(200,151,58,0.08)',
                  transition:'background .3s',
                  transitionDelay:`${i * 0.08}s`,
                }}
                onMouseEnter={e => e.currentTarget.style.background='#1A0F08'}
                onMouseLeave={e => e.currentTarget.style.background='#100A04'}
              >
                <div style={{ fontFamily:'sans-serif', fontSize:'.7rem', fontWeight:700, letterSpacing:'.12em', color:'rgba(200,151,58,0.4)', marginBottom:'1.2rem' }}>{f.n}</div>
                <h3 style={{ fontSize:'1.05rem', fontWeight:700, color:'#F5EDD8', marginBottom:'.6rem' }}>{f.title}</h3>
                <p style={{ fontFamily:'sans-serif', color:'#4A3828', fontSize:'.87rem', lineHeight:1.75 }}>{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ════════════ GALLERY / ATMOSPHERE ════════════ */}
      <section ref={gallRef} style={{ padding:'2rem 1.8rem 6rem', background:'#0C0705' }}>
        <div style={{ maxWidth:1200, margin:'0 auto' }}>
          <div className={`fade-up${gallVis?' in':''}`} style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'2rem', flexWrap:'wrap', gap:'1rem' }}>
            <div>
              <div className="label">The Experience</div>
              <h2 className="section-title" style={{ fontSize:'clamp(1.8rem,3.5vw,2.8rem)' }}>Come for the Food.<br />Stay for the Feeling.</h2>
            </div>
            <a href="#" className="btn-outline" style={{ flexShrink:0 }}>See Full Gallery</a>
          </div>

          {/* Gallery grid */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gridTemplateRows:'240px 240px', gap:8 }}>
            <div className="gallery-item" style={{ gridColumn:'1/2', gridRow:'1/3' }}>
              <img src={INTERIOR_IMG} alt="Arcadia interior at night" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            </div>
            <div className="gallery-item">
              <img src={FOOD_IMGS[2]} alt="Craft cocktail" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            </div>
            <div className="gallery-item">
              <img src={FOOD_IMGS[4]} alt="Plated dish" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            </div>
            <div className="gallery-item">
              <img src={FOOD_IMGS[5]} alt="Arcadia dinner" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
            </div>
            <div className="gallery-item" style={{ position:'relative' }}>
              <img src={EVENTS_IMG} alt="Private event" style={{ width:'100%', height:'100%', objectFit:'cover', opacity:.7 }} />
              <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', background:'rgba(12,7,5,0.55)' }}>
                <div style={{ fontFamily:'sans-serif', fontSize:'.72rem', letterSpacing:'.15em', textTransform:'uppercase', color:'#C8973A', marginBottom:6 }}>Private Events</div>
                <div style={{ fontSize:'1.1rem', fontWeight:700, color:'#F5EDD8', textAlign:'center' }}>Your Moment,<br/>Our Stage</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ════════════ PRICING / CATERING ════════════ */}
      <section ref={pricRef} style={{ padding:'6rem 1.8rem', background:'#100A04', borderTop:'1px solid rgba(200,151,58,0.1)' }}>
        <div style={{ maxWidth:1200, margin:'0 auto' }}>
          <div className={`fade-up${pricVis?' in':''}`} style={{ textAlign:'center', marginBottom:'3.5rem' }}>
            <div className="label" style={{ justifyContent:'center', display:'flex' }}>Catering &amp; Events</div>
            <h2 className="section-title">Feed Your People Well</h2>
            <div className="divider" style={{ margin:'1rem auto 1.6rem' }} />
            <p style={{ fontFamily:'sans-serif', color:'#5A4A3A', fontSize:'1rem', maxWidth:460, margin:'0 auto', lineHeight:1.8 }}>
              Whether it's 20 or 200, we make sure every guest leaves satisfied — and talking about it the next day.
            </p>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))', gap:'1.2rem', alignItems:'start' }}>
            {PLANS.map((plan, i) => (
              <div key={plan.name}
                className={`plan-card${plan.featured?' plan-featured':''} fade-up${pricVis?' in':''}`}
                style={{ position:'relative', transitionDelay:`${i * 0.12}s` }}
              >
                {plan.tag && (
                  <div style={{ position:'absolute', top:-12, left:'50%', transform:'translateX(-50%)', background:'#C8973A', color:'#0C0705', fontFamily:'sans-serif', fontSize:'.7rem', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase', padding:'.25rem 1rem', borderRadius:3 }}>
                    {plan.tag}
                  </div>
                )}

                <div className="label" style={{ marginBottom:'1rem' }}>{plan.name}</div>
                <p style={{ fontFamily:'sans-serif', fontSize:'.82rem', color:'#4A3828', marginBottom:'1.4rem', lineHeight:1.6 }}>{plan.desc}</p>

                <div style={{ marginBottom:'1.8rem' }}>
                  <span style={{ fontSize:'2.6rem', fontWeight:900, color: plan.featured?'#C8973A':'#F5EDD8' }}>{plan.price}</span>
                  <span style={{ fontFamily:'sans-serif', fontSize:'.85rem', color:'#4A3828', marginLeft:4 }}>{plan.unit}</span>
                </div>

                <ul style={{ listStyle:'none', marginBottom:'2rem' }}>
                  {plan.features.map(f => (
                    <li key={f} style={{ fontFamily:'sans-serif', fontSize:'.85rem', color:'#5A4A3A', padding:'.5rem 0', borderBottom:'1px solid rgba(200,151,58,0.07)', display:'flex', alignItems:'center', gap:10 }}>
                      <span style={{ color:'#C8973A', fontWeight:700, fontSize:'.8rem' }}>✦</span>{f}
                    </li>
                  ))}
                </ul>

                <button
                  className={plan.featured ? 'btn-gold' : 'btn-outline'}
                  style={{ width:'100%', justifyContent:'center' }}
                >
                  {plan.cta}
                </button>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ════════════ TESTIMONIALS ════════════ */}
      <section ref={testiRef} style={{ padding:'6rem 1.8rem', background:'#0C0705', position:'relative', overflow:'hidden' }}>
        {/* Ambient bg */}
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:600, height:400, borderRadius:'50%', background:'radial-gradient(ellipse, rgba(200,151,58,0.05) 0%, transparent 70%)', pointerEvents:'none' }} />

        <div style={{ maxWidth:900, margin:'0 auto', position:'relative', zIndex:1 }}>
          <div className={`fade-up${testiVis?' in':''}`} style={{ textAlign:'center', marginBottom:'3.5rem' }}>
            <div className="label" style={{ justifyContent:'center', display:'flex' }}>Testimonials</div>
            <h2 className="section-title">Words From<br />Our Table</h2>
          </div>

          {/* Active testimonial */}
          <div className={`fade-up${testiVis?' in':''}`} style={{ background:'#100A04', border:'1px solid rgba(200,151,58,0.15)', borderRadius:8, padding:'3rem', marginBottom:'2rem', minHeight:260, transition:'all .5s ease' }}>
            <div className="quote-mark">"</div>
            <p style={{ fontFamily:'Georgia,serif', fontSize:'1.15rem', color:'#D4C4A8', lineHeight:1.85, fontStyle:'italic', margin:'1rem 0 2rem' }}>
              {TESTIMONIALS[activeSlide].quote}
            </p>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <div style={{ width:48, height:48, borderRadius:'50%', background:'linear-gradient(135deg,#C8973A,#8B5E3C)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'sans-serif', fontWeight:700, fontSize:'.85rem', color:'#0C0705', flexShrink:0 }}>
                {TESTIMONIALS[activeSlide].initials}
              </div>
              <div>
                <div style={{ fontWeight:700, fontSize:'.95rem', color:'#F5EDD8' }}>{TESTIMONIALS[activeSlide].name}</div>
                <div style={{ fontFamily:'sans-serif', fontSize:'.75rem', color:'#4A3828', marginTop:2 }}>{TESTIMONIALS[activeSlide].role}</div>
              </div>
            </div>
          </div>

          {/* Dots */}
          <div style={{ display:'flex', justifyContent:'center', gap:10 }}>
            {TESTIMONIALS.map((_,i) => (
              <button key={i} onClick={() => setSlide(i)}
                style={{ width: i===activeSlide?28:8, height:8, borderRadius:4, border:'none', cursor:'pointer', background: i===activeSlide?'#C8973A':'rgba(200,151,58,0.25)', transition:'all .3s ease', padding:0 }}
              />
            ))}
          </div>
        </div>
      </section>

      {/* ════════════ CONTACT ════════════ */}
      <section ref={contactRef} style={{ padding:'6rem 1.8rem', background:'#100A04', borderTop:'1px solid rgba(200,151,58,0.1)' }}>
        <div style={{ maxWidth:1100, margin:'0 auto', display:'flex', flexWrap:'wrap', gap:'5rem' }}>
          {/* Left */}
          <div className={`fade-up${contactVis?' in':''}`} style={{ flex:'1 1 280px' }}>
            <div className="label">Come Find Us</div>
            <h2 className="section-title" style={{ fontSize:'clamp(1.8rem,3.5vw,2.8rem)' }}>Let's Make<br />a Reservation</h2>
            <div className="divider" />
            <div style={{ fontFamily:'sans-serif', fontSize:'.88rem', color:'#5A4A3A', lineHeight:2 }}>
              <div style={{ marginBottom:'1.5rem' }}>
                <div style={{ color:'#C8973A', fontSize:'.72rem', letterSpacing:'.14em', textTransform:'uppercase', marginBottom:4 }}>Address</div>
                <div>100 County Road 33A<br />Polk City, FL 33868</div>
              </div>
              <div style={{ marginBottom:'1.5rem' }}>
                <div style={{ color:'#C8973A', fontSize:'.72rem', letterSpacing:'.14em', textTransform:'uppercase', marginBottom:4 }}>Hours</div>
                <div>Tue–Thu: 11am – 9pm<br />Fri–Sat: 11am – 10pm<br />Sunday: 10am – 8pm</div>
              </div>
              <div>
                <div style={{ color:'#C8973A', fontSize:'.72rem', letterSpacing:'.14em', textTransform:'uppercase', marginBottom:4 }}>Phone</div>
                <div>(863) 555-0194</div>
              </div>
            </div>
          </div>

          {/* Form */}
          <div className={`fade-up${contactVis?' in':''}`} style={{ flex:'2 1 380px', transitionDelay:'.18s' }}>
            {sent ? (
              <div style={{ background:'#1A0F08', border:'1px solid rgba(200,151,58,0.2)', borderRadius:8, padding:'3rem', textAlign:'center' }}>
                <div style={{ fontSize:'3rem', marginBottom:'1rem' }}>🥂</div>
                <h3 style={{ fontSize:'1.4rem', fontWeight:700, color:'#F5EDD8', marginBottom:'.5rem' }}>Message Received!</h3>
                <p style={{ fontFamily:'sans-serif', color:'#5A4A3A', fontSize:'.9rem', lineHeight:1.7 }}>We'll be in touch within a few hours. Looking forward to seeing you at Arcadia.</p>
                <button onClick={() => setSent(false)} className="btn-outline" style={{ marginTop:'1.5rem' }}>Send Another</button>
              </div>
            ) : (
              <form onSubmit={e => { e.preventDefault(); setSent(true); setForm({name:'',email:'',message:''}); }}>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:'1rem', marginBottom:'1rem' }}>
                  {[{l:'Your Name',id:'name',t:'text',ph:'Maria González'},{l:'Email Address',id:'email',t:'email',ph:'maria@email.com'}].map(({l,id,t,ph}) => (
                    <div key={id}>
                      <label style={{ display:'block', fontFamily:'sans-serif', fontSize:'.78rem', fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'#4A3828', marginBottom:'.45rem' }}>{l}</label>
                      <input type={t} required placeholder={ph} value={form[id]}
                        onChange={e => setForm({...form,[id]:e.target.value})}
                        className="field" />
                    </div>
                  ))}
                </div>
                <div style={{ marginBottom:'1.5rem' }}>
                  <label style={{ display:'block', fontFamily:'sans-serif', fontSize:'.78rem', fontWeight:600, letterSpacing:'.08em', textTransform:'uppercase', color:'#4A3828', marginBottom:'.45rem' }}>Message</label>
                  <textarea required rows={5} placeholder="Hi Arcadia! I'd love to make a reservation for Saturday evening, party of 4..." value={form.message}
                    onChange={e => setForm({...form,message:e.target.value})}
                    className="field" style={{ resize:'vertical' }} />
                </div>
                <button type="submit" className="btn-gold">Send Message ↗</button>
              </form>
            )}
          </div>
        </div>

        {/* Bottom CTA banner */}
        <div style={{ maxWidth:1100, margin:'5rem auto 0', padding:'3rem', background:'linear-gradient(135deg,#1A0F08,#221508)', border:'1px solid rgba(200,151,58,0.2)', borderRadius:8, display:'flex', flexWrap:'wrap', justifyContent:'space-between', alignItems:'center', gap:'1.5rem' }}>
          <div>
            <div style={{ fontSize:'1.5rem', fontWeight:800, color:'#F5EDD8', marginBottom:'.3rem' }}>Ready to taste the difference?</div>
            <div style={{ fontFamily:'sans-serif', color:'#5A4A3A', fontSize:'.9rem' }}>Order online or visit us at 100 County Road 33A, Polk City, FL</div>
          </div>
          <a href="#order" className="btn-gold" style={{ flexShrink:0 }}>Order Now</a>
        </div>
      </section>

      {/* ════════════ FOOTER ════════════ */}
      <footer style={{ background:'#080503', borderTop:'1px solid rgba(200,151,58,0.1)', padding:'4rem 1.8rem 2rem' }}>
        <div style={{ maxWidth:1200, margin:'0 auto' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))', gap:'2.5rem 2rem', marginBottom:'3.5rem' }}>
            {/* Brand */}
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:'1.1rem' }}>
                <div style={{ width:30, height:30, borderRadius:'50%', border:'1.5px solid rgba(200,151,58,0.4)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ color:'#C8973A', fontSize:12, fontWeight:700, fontFamily:'sans-serif' }}>A</span>
                </div>
                <span style={{ fontWeight:800, fontSize:'1.2rem', letterSpacing:'-.01em', color:'#F5EDD8' }}>ARCADIA</span>
              </div>
              <p style={{ fontFamily:'sans-serif', fontSize:'.83rem', color:'#3A2A1A', lineHeight:1.8, marginBottom:'1.4rem', maxWidth:200 }}>
                A neighborhood restaurant rooted in Central Florida. Real food, every day.
              </p>
              <div style={{ display:'flex', gap:8 }}>
                {['f','ig','tw','yt'].map((s,i) => (
                  <div key={i} style={{ width:32, height:32, borderRadius:4, border:'1px solid rgba(200,151,58,0.15)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', transition:'border-color .2s', fontFamily:'sans-serif', fontSize:'.7rem', fontWeight:700, color:'#3A2A1A' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(200,151,58,0.5)'; e.currentTarget.style.color='#C8973A'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(200,151,58,0.15)'; e.currentTarget.style.color='#3A2A1A'; }}
                  >{s.toUpperCase()}</div>
                ))}
              </div>
            </div>

            {FOOTER_COLS.map(col => (
              <div key={col.title}>
                <div className="label" style={{ marginBottom:'1rem' }}>{col.title}</div>
                {col.links.map(l => <a key={l} href="#" className="foot-link">{l}</a>)}
              </div>
            ))}
          </div>

          <div style={{ borderTop:'1px solid rgba(200,151,58,0.07)', paddingTop:'2rem', fontFamily:'sans-serif', fontSize:'.78rem', color:'#2A1A0A', display:'flex', flexWrap:'wrap', justifyContent:'space-between', gap:'0.5rem' }}>
            <span>© 2026 Arcadia Restaurant · 100 County Road 33A, Polk City, FL 33868</span>
            <span>Privacy · Terms · Accessibility</span>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
